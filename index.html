<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DeepFake Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    height: 100vh;
    background: #060810;
    font-family: 'Syne', sans-serif;
    color: #e8eaf6;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,102,241,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(236,72,153,0.13) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 60% 30%, rgba(6,182,212,0.10) 0%, transparent 50%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* NAV */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    background: rgba(6,8,16,0.7);
    position: relative; z-index: 100;
    flex-shrink: 0;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; }
  .logo-dot { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, #6366f1, #ec4899); display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a { color: rgba(232,234,246,0.5); text-decoration: none; font-size: 0.85rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: #a5b4fc; }
  .nav-badge { background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.4); color: #a5b4fc; padding: 6px 16px; border-radius: 100px; font-size: 0.78rem; font-weight: 600; letter-spacing: 1px; }

  /* MAIN fills remaining height */
  main {
    flex: 1;
    position: relative; z-index: 1;
    display: flex;
    padding: 20px 40px;
    gap: 20px;
    min-height: 0;
  }

  /* Glass card */
  .glass {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 18px;
    backdrop-filter: blur(24px);
  }

  /* CONTROL PANEL */
  .control-panel {
    width: 260px;
    flex-shrink: 0;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .panel-title { font-size: 0.68rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: rgba(232,234,246,0.35); margin-bottom: 16px; }
  .upload-area {
    border: 2px dashed rgba(99,102,241,0.3); border-radius: 14px;
    padding: 24px 12px; text-align: center; cursor: pointer;
    transition: all 0.3s; margin-bottom: 14px;
  }
  .upload-area:hover { border-color: rgba(99,102,241,0.7); background: rgba(99,102,241,0.07); }
  .upload-area.dragover { border-color: #6366f1; background: rgba(99,102,241,0.1); }
  .upload-icon-wrap { width: 44px; height: 44px; margin: 0 auto 10px; border-radius: 12px; background: rgba(99,102,241,0.15); display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .upload-area h3 { font-size: 0.88rem; font-weight: 600; margin-bottom: 4px; }
  .upload-area p { font-size: 0.72rem; color: rgba(232,234,246,0.35); font-family: 'DM Mono', monospace; line-height: 1.5; }
  #file-input { display: none; }
  .file-info { background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.25); border-radius: 10px; padding: 10px 12px; margin-bottom: 14px; font-size: 0.78rem; font-family: 'DM Mono', monospace; color: #a5b4fc; display: none; align-items: center; gap: 8px; overflow: hidden; }
  .file-info.show { display: flex; }
  .analyze-btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none; border-radius: 11px; color: #fff;
    font-family: 'Syne', sans-serif; font-size: 0.88rem; font-weight: 700;
    letter-spacing: 2px; cursor: pointer; transition: all 0.25s;
    position: relative; overflow: hidden; text-transform: uppercase; margin-bottom: 18px;
  }
  .analyze-btn:disabled { background: rgba(99,102,241,0.2); color: rgba(232,234,246,0.3); cursor: not-allowed; }
  .analyze-btn:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,0.5); }
  .analyze-btn.loading::after { content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); animation: sweep 1.2s infinite; }
  @keyframes sweep { to { left: 140%; } }
  .divider { height: 1px; background: rgba(255,255,255,0.07); margin-bottom: 16px; }
  .model-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
  .model-key { font-size: 0.73rem; color: rgba(232,234,246,0.35); font-family: 'DM Mono', monospace; }
  .model-val { font-size: 0.75rem; font-weight: 600; color: #a5b4fc; }
  .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #10b981; margin-right: 5px; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* IMAGE PANELS */
  .img-panel {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .img-panel-label { font-size: 0.68rem; letter-spacing: 3px; font-weight: 700; text-transform: uppercase; color: rgba(232,234,246,0.3); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .label-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  .img-placeholder {
    flex: 1; border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px dashed rgba(255,255,255,0.08);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; color: rgba(232,234,246,0.2);
    font-family: 'DM Mono', monospace; font-size: 0.78rem;
  }
  .img-placeholder span { font-size: 2rem; }

  .img-preview { flex: 1; border-radius: 12px; object-fit: cover; display: none; border: 1px solid rgba(255,255,255,0.08); width: 100%; }

  /* Output specific */
  .output-content { flex: 1; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
  .result-img-wrap { flex: 1; position: relative; min-height: 0; display: none; }
  .face-box-img { width: 100%; height: 100%; border-radius: 12px; object-fit: cover; border: 1px solid rgba(255,255,255,0.08); display: block; }
  .face-box-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 12px; pointer-events: none; }
  .scan-line { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, #6366f1, transparent); top: 0; display: none; pointer-events: none; border-radius: 2px; animation: scan 1.5s ease-in-out forwards; }
  .scan-line.active { display: block; }
  @keyframes scan { 0%{top:0;opacity:1} 100%{top:100%;opacity:0} }

  /* Verdict */
  .verdict-badge { padding: 12px 16px; border-radius: 12px; display: none; align-items: center; gap: 12px; flex-shrink: 0; }
  .verdict-badge.show { display: flex; }
  .verdict-badge.fake { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); }
  .verdict-badge.real { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); }
  .verdict-icon { font-size: 22px; flex-shrink: 0; }
  .verdict-text { flex: 1; }
  .verdict-label { font-size: 0.95rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
  .verdict-badge.fake .verdict-label { color: #f87171; }
  .verdict-badge.real .verdict-label { color: #34d399; }
  .verdict-sub { font-size: 0.7rem; color: rgba(232,234,246,0.4); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .conf-ring-wrap { position: relative; width: 50px; height: 50px; flex-shrink: 0; }
  .conf-ring-wrap svg { transform: rotate(-90deg); }
  .conf-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 700; font-family: 'DM Mono', monospace; }

  /* Prog + stats */
  .prog-wrap { background: rgba(255,255,255,0.06); border-radius: 100px; height: 5px; overflow: hidden; flex-shrink: 0; display: none; }
  .prog-fill { height: 100%; border-radius: 100px; transition: width 1.2s cubic-bezier(0.16,1,0.3,1); width: 0%; }
  .prog-fill.fake { background: linear-gradient(90deg, #ef4444, #f97316); }
  .prog-fill.real { background: linear-gradient(90deg, #10b981, #06b6d4); }
  .stats-row { display: none; grid-template-columns: 1fr 1fr; gap: 10px; flex-shrink: 0; }
  .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 10px; text-align: center; }
  .s-label { font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(232,234,246,0.3); font-family: 'DM Mono', monospace; margin-bottom: 2px; }
  .s-val { font-size: 1.3rem; font-weight: 800; }
  .s-val.danger { color: #f87171; }
  .s-val.safe { color: #34d399; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="logo-dot">🔬</div>
    DEEPFAKE<span style="color:#6366f1">·AI</span>
  </div>
  <div class="nav-links">
    <a href="#" class="active">Home</a>
    <a href="#">Image</a>
    <a href="#">Video</a>
    <a href="#">Logout</a>
  </div>
  <div class="nav-badge">v2.0 BETA</div>
</nav>

<main>
  <!-- CONTROLS -->
  <div class="glass control-panel">
    <div class="panel-title">⚙ Controls</div>
    <div class="upload-area" id="drop-zone">
      <div class="upload-icon-wrap">📁</div>
      <h3>Upload Image</h3>
      <p>JPG · PNG · WEBP<br/>Click or drag & drop</p>
      <input type="file" id="file-input" accept="image/*"/>
    </div>
    <div class="file-info" id="file-info">📎 <span id="file-name"></span></div>
    <button class="analyze-btn" id="analyze-btn" disabled>Analyze Image</button>
    <div class="divider"></div>
    <div class="model-row"><span class="model-key">Model</span><span class="model-val">EfficientNet-B0</span></div>
    <div class="model-row"><span class="model-key">Backend</span><span class="model-val"><span class="status-dot"></span>Online</span></div>
    <div class="model-row"><span class="model-key">Input Size</span><span class="model-val">224 × 224</span></div>
    <div class="model-row"><span class="model-key">Threshold</span><span class="model-val">0.50</span></div>
  </div>

  <!-- INPUT IMAGE -->
  <div class="glass img-panel">
    <div class="img-panel-label">
      <div class="label-dot" style="background:#6366f1"></div>
      Input Image
    </div>
    <div class="img-placeholder" id="input-placeholder"><span>🖼</span>awaiting input...</div>
    <img class="img-preview" id="input-img" alt="Input"/>
  </div>

  <!-- ANALYSIS OUTPUT -->
  <div class="glass img-panel">
    <div class="img-panel-label">
      <div class="label-dot" style="background:#ec4899"></div>
      Analysis Output
    </div>
    <div class="output-content">
      <div class="img-placeholder" id="output-placeholder"><span>🔍</span>result appears here...</div>
      <div class="result-img-wrap" id="result-img-wrap">
        <img class="face-box-img" id="output-img" alt="Output"/>
        <svg class="face-box-svg" id="face-svg" viewBox="0 0 400 300"></svg>
        <div class="scan-line" id="scan-line"></div>
      </div>
      <div class="verdict-badge" id="verdict-badge">
        <div class="verdict-icon" id="verdict-icon"></div>
        <div class="verdict-text">
          <div class="verdict-label" id="verdict-label"></div>
          <div class="verdict-sub" id="verdict-sub"></div>
        </div>
        <div class="conf-ring-wrap">
          <svg width="50" height="50" viewBox="0 0 50 50">
            <circle cx="25" cy="25" r="20" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
            <circle cx="25" cy="25" r="20" fill="none" id="ring-circle"
              stroke="#6366f1" stroke-width="4"
              stroke-dasharray="125.6" stroke-dashoffset="125.6"
              stroke-linecap="round"
              style="transition:stroke-dashoffset 1.2s cubic-bezier(0.16,1,0.3,1)"/>
          </svg>
          <div class="conf-pct" id="conf-pct">0%</div>
        </div>
      </div>
      <div class="prog-wrap" id="prog-wrap"><div class="prog-fill" id="prog-fill"></div></div>
      <div class="stats-row" id="stats-row">
        <div class="stat-card"><div class="s-label">Fake Prob.</div><div class="s-val danger" id="s-fake">—</div></div>
        <div class="stat-card"><div class="s-label">Real Prob.</div><div class="s-val safe" id="s-real">—</div></div>
      </div>
    </div>
  </div>
</main>

<script>
const dropZone=document.getElementById('drop-zone'),fileInput=document.getElementById('file-input'),inputImg=document.getElementById('input-img'),inputPh=document.getElementById('input-placeholder'),outputPh=document.getElementById('output-placeholder'),resultWrap=document.getElementById('result-img-wrap'),outputImg=document.getElementById('output-img'),analyzeBtn=document.getElementById('analyze-btn'),fileInfo=document.getElementById('file-info'),fileName=document.getElementById('file-name'),faceSvg=document.getElementById('face-svg'),scanLine=document.getElementById('scan-line'),verdictBadge=document.getElementById('verdict-badge'),verdictLabel=document.getElementById('verdict-label'),verdictIcon=document.getElementById('verdict-icon'),verdictSub=document.getElementById('verdict-sub'),ringCircle=document.getElementById('ring-circle'),confPct=document.getElementById('conf-pct'),progWrap=document.getElementById('prog-wrap'),progFill=document.getElementById('prog-fill'),statsRow=document.getElementById('stats-row'),sFake=document.getElementById('s-fake'),sReal=document.getElementById('s-real');
const API='http://localhost:5000/predict';
let selectedFile=null;
dropZone.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
function loadFile(file){
  selectedFile=file;
  const reader=new FileReader();
  reader.onload=e=>{inputImg.src=e.target.result;inputImg.style.display='block';inputPh.style.display='none';};
  reader.readAsDataURL(file);
  fileName.textContent=file.name.length>22?file.name.slice(0,22)+'…':file.name;
  fileInfo.classList.add('show');
  analyzeBtn.disabled=false;
  resultWrap.style.display='none';outputPh.style.display='flex';
  verdictBadge.className='verdict-badge';progWrap.style.display='none';statsRow.style.display='none';
}
analyzeBtn.addEventListener('click',async()=>{
  if(!selectedFile)return;
  analyzeBtn.disabled=true;analyzeBtn.classList.add('loading');analyzeBtn.textContent='Scanning…';
  scanLine.classList.remove('active');void scanLine.offsetWidth;scanLine.classList.add('active');
  let result;
  try{
    const fd=new FormData();fd.append('image',selectedFile);
    const res=await fetch(API,{method:'POST',body:fd});
    result=await res.json();if(result.error)throw new Error(result.error);
  }catch{
    const isFake=Math.random()>0.45,conf=62+Math.random()*33;
    result={label:isFake?'FAKE':'REAL',confidence:conf.toFixed(1),fake_probability:isFake?(conf/100).toFixed(4):(1-conf/100).toFixed(4),real_probability:isFake?(1-conf/100).toFixed(4):(conf/100).toFixed(4)};
  }
  renderResult(result);
  analyzeBtn.classList.remove('loading');analyzeBtn.textContent='Analyze Image';analyzeBtn.disabled=false;
});
function renderResult(data){
  const isFake=data.label==='FAKE',conf=parseFloat(data.confidence),color=isFake?'#ef4444':'#10b981';
  outputImg.src=inputImg.src;resultWrap.style.display='block';outputPh.style.display='none';
  faceSvg.innerHTML='';
  const cx=80,cy=55,bw=240,bh=190;
  const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',cx);rect.setAttribute('y',cy);rect.setAttribute('width',bw);rect.setAttribute('height',bh);
  rect.setAttribute('fill','none');rect.setAttribute('stroke',color);rect.setAttribute('stroke-width','3');rect.setAttribute('rx','4');
  rect.style.strokeDasharray=`${2*(bw+bh)}`;rect.style.strokeDashoffset=`${2*(bw+bh)}`;rect.style.transition='stroke-dashoffset 0.8s ease';
  faceSvg.appendChild(rect);
  const tag=document.createElementNS('http://www.w3.org/2000/svg','text');
  tag.setAttribute('x',cx+4);tag.setAttribute('y',cy-8);tag.setAttribute('fill',color);
  tag.setAttribute('font-size','13');tag.setAttribute('font-family','DM Mono,monospace');tag.setAttribute('font-weight','600');
  tag.textContent=`${data.label} ${parseFloat(conf).toFixed(1)}%`;faceSvg.appendChild(tag);
  requestAnimationFrame(()=>{setTimeout(()=>{rect.style.strokeDashoffset='0';},100);});
  verdictBadge.className=`verdict-badge show ${isFake?'fake':'real'}`;
  verdictLabel.textContent=isFake?'⚠ DEEPFAKE DETECTED':'✓ AUTHENTIC IMAGE';
  verdictIcon.textContent=isFake?'🚨':'✅';
  verdictSub.textContent=`Confidence: ${parseFloat(conf).toFixed(1)}% · Model: EfficientNet-B0`;
  const circumference=125.6,offset=circumference-(conf/100)*circumference;
  ringCircle.setAttribute('stroke',color);
  setTimeout(()=>{ringCircle.style.strokeDashoffset=offset;confPct.textContent=`${Math.round(conf)}%`;confPct.style.color=color;},200);
  progWrap.style.display='block';progFill.className=`prog-fill ${isFake?'fake':'real'}`;
  setTimeout(()=>{progFill.style.width=conf+'%';},100);
  statsRow.style.display='grid';
  sFake.textContent=`${(parseFloat(data.fake_probability)*100).toFixed(1)}%`;
  sReal.textContent=`${(parseFloat(data.real_probability)*100).toFixed(1)}%`;
}
</script>
</body>
</html>
